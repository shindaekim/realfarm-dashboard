<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealFarm Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: '맑은 고딕', sans-serif; background: #1a1a2e; color: #eee; padding: 12px; }
  h1 { font-size: 18px; color: #aaa; margin-bottom: 8px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .top-bar .update-info { font-size: 12px; color: #888; }
  .top-bar .update-info.stale { color: #ff4444; }

  /* 경고 패널 */
  .alerts { display: flex; gap: 12px; margin-bottom: 12px; }
  .alert-box { flex: 1; background: #2a1a1a; border: 1px solid #442222; border-radius: 8px; padding: 10px; min-height: 60px; }
  .alert-box h3 { font-size: 13px; color: #ff6b6b; margin-bottom: 6px; }
  .alert-box.ok { background: #1a2a1a; border-color: #224422; }
  .alert-box.ok h3 { color: #6bff6b; }
  .alert-item { font-size: 12px; padding: 2px 0; display: flex; justify-content: space-between; }
  .alert-item .name { color: #ddd; }
  .alert-item .val { color: #ff6b6b; font-weight: bold; }

  /* 차트 영역 */
  .charts { display: flex; gap: 12px; margin-bottom: 12px; }
  .chart-box { flex: 1; background: #16213e; border-radius: 8px; padding: 12px; }
  .chart-box h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; }
  .bar-label { width: 70px; text-align: right; margin-right: 8px; color: #aaa; }
  .bar-track { flex: 1; height: 20px; background: #0f3460; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .bar-count { position: absolute; right: 6px; top: 2px; font-size: 11px; color: #fff; }
  .status-갈엎중 { background: #4caf50; }
  .status-정산중 { background: #ff9800; }
  .status-안전거래중 { background: #2196f3; }
  .status-대기중 { background: #666; }

  /* 도넛 차트 */
  .donut-wrap { display: flex; align-items: center; gap: 16px; }
  .donut-svg { width: 100px; height: 100px; }
  .donut-legend { font-size: 12px; }
  .donut-legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .donut-legend .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* 테이블 */
  .table-wrap { background: #16213e; border-radius: 8px; padding: 12px; overflow-x: auto; }
  .table-wrap h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #0f3460; color: #aaa; padding: 6px 8px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #fff; }
  th .sort-arrow { font-size: 10px; margin-left: 3px; }
  td { padding: 5px 8px; border-bottom: 1px solid #1a1a3e; white-space: nowrap; }
  tr:hover { background: #1a2a4e; cursor: pointer; }
  tr.selected-row { background: #2a3a6e !important; outline: 1px solid #4a7aff; }
  .tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
  .tag-갈엎중 { background: #1b5e20; color: #a5d6a7; }
  .tag-정산중 { background: #e65100; color: #ffcc80; }
  .tag-안전거래중 { background: #0d47a1; color: #90caf9; }
  .tag-대기중 { background: #333; color: #999; }
  .warn { color: #ff4444; font-weight: bold; }
  .stale-row { opacity: 0.5; }
  .gold { color: #ffd700; }

  /* Sell 영역 */
  .sell-section { display: flex; gap: 12px; margin-top: 12px; }
  .sell-form { flex: 0 0 320px; background: #16213e; border-radius: 8px; padding: 12px; }
  .sell-form h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; }
  .sell-form label { display: block; font-size: 12px; color: #aaa; margin-bottom: 3px; }
  .sell-form input, .sell-form select { width: 100%; padding: 6px 8px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 13px; margin-bottom: 8px; }
  .sell-form select { cursor: pointer; }
  .sell-form .btn-row { display: flex; gap: 8px; }
  .sell-form button { flex: 1; padding: 8px; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }
  .btn-hm { background: #e91e63; color: #fff; }
  .btn-hm:hover { background: #c2185b; }
  .btn-ct { background: #2196f3; color: #fff; }
  .btn-ct:hover { background: #1565c0; }
  .sell-queue { flex: 1; background: #16213e; border-radius: 8px; padding: 12px; }
  .sell-queue h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .sell-queue .empty { color: #666; font-size: 12px; }
  .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; margin-bottom: 4px; background: #1a1a3e; border-radius: 4px; font-size: 12px; }
  .queue-item .info { }
  .queue-item .item-hm { color: #e91e63; }
  .queue-item .item-ct { color: #2196f3; }
  .queue-item .del-btn { background: #442222; border: none; color: #ff6b6b; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
  .queue-item .del-btn:hover { background: #663333; }
  .sell-toast { position: fixed; bottom: 20px; right: 20px; background: #4caf50; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; display: none; z-index: 100; }
  .sell-toast.error { background: #f44336; }

  /* 골드 트렌드 */
  .gold-trend { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .gold-trend h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  .gold-trend canvas { width: 100%; height: 250px; }
  /* 제어 버튼 */
  .ctrl-btn { border: none; padding: 3px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; font-weight: bold; }
  .ctrl-run { background: #1b5e20; color: #a5d6a7; }
  .ctrl-run:hover { background: #2e7d32; }
  .ctrl-stop { background: #b71c1c; color: #ef9a9a; }
  .ctrl-stop:hover { background: #c62828; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🌱 RealFarm Dashboard</h1>
  <div class="update-info" id="updateInfo">로딩 중...</div>
</div>

<div class="alerts">
  <div class="alert-box" id="bagAlert">
    <h3>📦 가방 경고 (여유 &lt; 4)</h3>
    <div id="bagList"></div>
  </div>
  <div class="alert-box" id="drinkAlert">
    <h3>💊 체력 경고 (&lt; 2)</h3>
    <div id="drinkList"></div>
  </div>
</div>

<div class="charts">
  <div class="chart-box">
    <h3>상태 현황</h3>
    <div id="statusBars"></div>
  </div>
  <div class="chart-box">
    <h3>PC별 가동</h3>
    <div class="donut-wrap">
      <svg class="donut-svg" id="donutSvg" viewBox="0 0 42 42"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>

<div class="gold-trend">
  <h3>💰 골드 트렌드 (30일)</h3>
  <canvas id="goldChart"></canvas>
</div>

<div class="table-wrap">
  <h3>디바이스 상세</h3>
  <table>
    <thead>
      <tr>
        <th onclick="sortTable('pc_id')">PC<span class="sort-arrow" id="sort_pc_id"></span></th>
        <th onclick="sortTable('device_id')">#<span class="sort-arrow" id="sort_device_id"></span></th>
        <th onclick="sortTable('name')">이름<span class="sort-arrow" id="sort_name"></span></th>
        <th>제어</th>
        <th onclick="sortTable('status')">상태<span class="sort-arrow" id="sort_status"></span></th>
        <th onclick="sortTable('bag_pct')">가방<span class="sort-arrow" id="sort_bag_pct"></span></th>
        <th onclick="sortTable('high_mineral')">고미<span class="sort-arrow" id="sort_high_mineral"></span></th>
        <th onclick="sortTable('crack_time')">시균<span class="sort-arrow" id="sort_crack_time"></span></th>
        <th onclick="sortTable('drink')">체력<span class="sort-arrow" id="sort_drink"></span></th>
        <th onclick="sortTable('gold')">골드<span class="sort-arrow" id="sort_gold"></span></th>
        <th onclick="sortTable('last_update')">업데이트<span class="sort-arrow" id="sort_last_update"></span></th>
      </tr>
    </thead>
    <tbody id="statusTable"></tbody>
  </table>
</div>

<div class="sell-section">
  <div class="sell-form">
    <h3>🛒 안전거래 주문</h3>
    <label>PC</label>
    <select id="sellPc"><option value="PC7">PC7</option></select>
    <label>디바이스</label>
    <div style="display:flex;gap:4px">
      <input type="text" id="sellDevice" value="자동 (수량 최대)" readonly style="color:#888;cursor:default;flex:1">
      <button onclick="clearDeviceSelection()" style="background:#442222;border:none;color:#ff6b6b;padding:0 8px;border-radius:4px;cursor:pointer;font-size:13px">✕</button>
    </div>
    <input type="hidden" id="sellDeviceId" value="">
    <label>구매자</label>
    <input type="text" id="sellName" placeholder="구매자 이름">
    <label>가격 (만골드)</label>
    <input type="number" id="sellPrice" value="3000" step="100" min="100">
    <label>반복</label>
    <select id="sellCount"></select>
    <div class="btn-row">
      <button class="btn-hm" onclick="submitSell('high_mineral')">고미 주문</button>
      <button class="btn-ct" onclick="submitSell('crack_time')">시균 주문</button>
    </div>
  </div>
  <div class="sell-queue">
    <h3>📋 대기열</h3>
    <div id="queueList"><div class="empty">대기 중인 주문 없음</div></div>
  </div>
</div>
<div class="sell-toast" id="sellToast"></div>

<script>
const SUPABASE_URL = 'https://vszizoahwfjvcoxrjygr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeml6b2Fod2ZqdmNveHJqeWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mjk0NzIsImV4cCI6MjA5MDUwNTQ3Mn0.8IOMrEgoDycG2TOBT5Vtliy3CUs9Ua5AtpCqHvGdEv8';

async function fetchStatus() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/status?select=*&order=pc_id.asc,device_id.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return await res.json();
}

function formatGold(g) {
  if (!g) return '-';
  const n = parseInt(g.replace(/,/g, ''));
  if (isNaN(n)) return g;
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (n >= 10000) return (n / 10000).toFixed(0) + '만';
  return g;
}

function timeSince(iso) {
  if (!iso) return '-';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + '초 전';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  return Math.floor(diff / 3600) + '시간 전';
}

function isStale(iso) {
  if (!iso) return true;
  return (Date.now() - new Date(iso).getTime()) > 120000; // 2분
}

function render(data) {
  lastData = data;
  const now = new Date().toLocaleTimeString('ko-KR');
  document.getElementById('updateInfo').textContent = `마지막 갱신: ${now} | ${data.length}대`;

  // 정렬
  data = [...data].sort((a, b) => {
    const va = getSortValue(a, currentSort.key);
    const vb = getSortValue(b, currentSort.key);
    let cmp = 0;
    if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return currentSort.asc ? cmp : -cmp;
  });

  // 경고: 가방
  const bagWarns = data.filter(d => {
    const item = parseInt(d.item_cnt) || 0;
    const total = parseInt(d.total_cnt) || 0;
    return total > 0 && (total - item) < 4;
  });
  const bagBox = document.getElementById('bagAlert');
  const bagList = document.getElementById('bagList');
  if (bagWarns.length === 0) {
    bagBox.className = 'alert-box ok';
    bagBox.querySelector('h3').textContent = '📦 가방 정상';
    bagList.innerHTML = '<div style="color:#6bff6b;font-size:12px">경고 없음</div>';
  } else {
    bagBox.className = 'alert-box';
    bagBox.querySelector('h3').textContent = `📦 가방 경고 (${bagWarns.length}대)`;
    bagList.innerHTML = bagWarns.map(d =>
      `<div class="alert-item"><span class="name">${d.pc_id}-${d.device_id} ${d.name||''}</span><span class="val">${d.item_cnt}/${d.total_cnt}</span></div>`
    ).join('');
  }

  // 경고: 체력
  const drinkWarns = data.filter(d => {
    if (d.drink == null || d.drink === '') return false;
    const drink = parseInt(d.drink);
    return !isNaN(drink) && drink < 2;
  });
  const drinkBox = document.getElementById('drinkAlert');
  const drinkList = document.getElementById('drinkList');
  if (drinkWarns.length === 0) {
    drinkBox.className = 'alert-box ok';
    drinkBox.querySelector('h3').textContent = '💊 체력 정상';
    drinkList.innerHTML = '<div style="color:#6bff6b;font-size:12px">경고 없음</div>';
  } else {
    drinkBox.className = 'alert-box';
    drinkBox.querySelector('h3').textContent = `💊 체력 경고 (${drinkWarns.length}대)`;
    drinkList.innerHTML = drinkWarns.map(d =>
      `<div class="alert-item"><span class="name">${d.pc_id}-${d.device_id} ${d.name||''}</span><span class="val">${d.drink||0}</span></div>`
    ).join('');
  }

  // 상태 바 차트
  const statusCounts = {};
  const statuses = ['갈엎중', '정산중', '안전거래중', '대기중'];
  statuses.forEach(s => statusCounts[s] = 0);
  data.forEach(d => {
    const s = d.status || '대기중';
    statusCounts[s] = (statusCounts[s] || 0) + 1;
  });
  const maxCount = Math.max(...Object.values(statusCounts), 1);
  document.getElementById('statusBars').innerHTML = statuses.map(s => {
    const c = statusCounts[s] || 0;
    const pct = (c / data.length * 100) || 0;
    return `<div class="bar-row">
      <div class="bar-label">${s}</div>
      <div class="bar-track">
        <div class="bar-fill status-${s}" style="width:${pct}%"></div>
        <div class="bar-count">${c}</div>
      </div>
    </div>`;
  }).join('');

  // 도넛: PC별
  const pcCounts = {};
  data.forEach(d => { pcCounts[d.pc_id] = (pcCounts[d.pc_id] || 0) + 1; });
  const pcColors = ['#e91e63', '#2196f3', '#4caf50', '#ff9800', '#9c27b0', '#00bcd4'];
  const pcs = Object.keys(pcCounts).sort();
  let offset = 0;
  const totalDevices = data.length || 1;
  const segments = pcs.map((pc, i) => {
    const pct = pcCounts[pc] / totalDevices * 100;
    const dashArray = `${pct} ${100 - pct}`;
    const seg = `<circle cx="21" cy="21" r="15.9" fill="none" stroke="${pcColors[i % pcColors.length]}"
      stroke-width="5" stroke-dasharray="${dashArray}" stroke-dashoffset="${-offset}" />`;
    offset += pct;
    return seg;
  });
  document.getElementById('donutSvg').innerHTML =
    `<circle cx="21" cy="21" r="15.9" fill="none" stroke="#0f3460" stroke-width="5"/>` +
    segments.join('');
  document.getElementById('donutLegend').innerHTML = pcs.map((pc, i) =>
    `<div><span class="dot" style="background:${pcColors[i % pcColors.length]}"></span>${pc}: ${pcCounts[pc]}대</div>`
  ).join('');

  // 테이블
  document.getElementById('statusTable').innerHTML = data.map(d => {
    const item = parseInt(d.item_cnt) || 0;
    const total = parseInt(d.total_cnt) || 0;
    const bagFree = total - item;
    const drink = parseInt(d.drink) || 0;
    const stale = isStale(d.last_update);
    const status = d.status || '대기중';
    const bagPct = total > 0 ? Math.round(item / total * 100) : 0;
    const bagStr = total > 0 ? `${item}/${total} (${bagPct}%)` : '-';
    const bagWarn = total > 0 && bagFree < 4;

    const isWaiting = status === '대기중';
    const isRunning = status === '갈엎중' || status === '정산중';
    const ctrlHtml = isWaiting
      ? `<button class="ctrl-btn ctrl-run" onclick="sendCommand(event,'${d.pc_id}',${d.device_id},'run')">▶ 시작</button>`
      : isRunning
      ? `<button class="ctrl-btn ctrl-stop" onclick="sendCommand(event,'${d.pc_id}',${d.device_id},'stop')">■ 정지</button>`
      : '';

    return `<tr class="${stale ? 'stale-row' : ''}" onclick="selectDevice('${d.pc_id}',${d.device_id},'${(d.name||'').replace(/'/g,"\\'")}')">
      <td>${d.pc_id}</td>
      <td>${d.device_id}</td>
      <td>${d.name || '-'}</td>
      <td>${ctrlHtml}</td>
      <td><span class="tag tag-${status}">${status}</span></td>
      <td class="${bagWarn ? 'warn' : ''}">${bagStr}</td>
      <td>${d.high_mineral || '-'}</td>
      <td>${d.crack_time || '-'}</td>
      <td class="${drink < 2 ? 'warn' : ''}">${d.drink || '-'}</td>
      <td class="gold">${formatGold(d.gold)}</td>
      <td class="${stale ? 'warn' : ''}">${timeSince(d.last_update)}</td>
    </tr>`;
  }).join('');
}

let currentSort = { key: 'device_id', asc: true };
let lastData = [];

function sortTable(key) {
  if (currentSort.key === key) {
    currentSort.asc = !currentSort.asc;
  } else {
    currentSort.key = key;
    currentSort.asc = true;
  }
  // 화살표 표시
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  const arrow = document.getElementById(`sort_${key}`);
  if (arrow) arrow.textContent = currentSort.asc ? ' ▲' : ' ▼';
  if (lastData.length) render(lastData);
}

function getSortValue(d, key) {
  switch(key) {
    case 'bag_pct':
      const item = parseInt(d.item_cnt) || 0;
      const total = parseInt(d.total_cnt) || 0;
      return total > 0 ? item / total : -1;
    case 'high_mineral': return parseInt(d.high_mineral) || 0;
    case 'crack_time': return parseInt(d.crack_time) || 0;
    case 'drink': return parseInt(d.drink) || -1;
    case 'gold': return parseInt((d.gold || '0').replace(/,/g, '')) || 0;
    case 'device_id': return d.device_id || 0;
    case 'last_update': return d.last_update ? new Date(d.last_update).getTime() : 0;
    default: return d[key] || '';
  }
}

// Sell 반복 콤보 초기화
(function() {
  const sel = document.getElementById('sellCount');
  for (let i = 1; i <= 20; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i;
    sel.appendChild(opt);
  }
})();

// PC 목록 동적 로드
async function loadPcList() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/status?select=pc_id&order=pc_id.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    const pcs = [...new Set(data.map(d => d.pc_id))];
    const sel = document.getElementById('sellPc');
    sel.innerHTML = pcs.map(pc => `<option value="${pc}">${pc}</option>`).join('');
  } catch(e) {}
}

function selectDevice(pcId, deviceId, name) {
  const current = document.getElementById('sellDeviceId').value;
  if (current === String(deviceId)) {
    clearDeviceSelection();
    return;
  }
  document.getElementById('sellPc').value = pcId;
  document.getElementById('sellDeviceId').value = deviceId;
  document.getElementById('sellDevice').value = `#${deviceId} ${name}`;
  document.getElementById('sellDevice').style.color = '#4a7aff';
  document.querySelectorAll('#statusTable tr').forEach(tr => tr.classList.remove('selected-row'));
  event.currentTarget.classList.add('selected-row');
  document.querySelector('.sell-form').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// 자동 배정으로 초기화
function clearDeviceSelection() {
  document.getElementById('sellDeviceId').value = '';
  document.getElementById('sellDevice').value = '자동 (수량 최대)';
  document.getElementById('sellDevice').style.color = '#888';
  document.querySelectorAll('#statusTable tr').forEach(tr => tr.classList.remove('selected-row'));
}

function showToast(msg, isError) {
  const t = document.getElementById('sellToast');
  t.textContent = msg;
  t.className = 'sell-toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function submitSell(item) {
  const pcId = document.getElementById('sellPc').value;
  const name = document.getElementById('sellName').value.trim();
  const price = parseInt(document.getElementById('sellPrice').value) || 3000;
  const count = parseInt(document.getElementById('sellCount').value) || 1;

  if (!name) { showToast('구매자 이름을 입력하세요', true); return; }

  const deviceId = document.getElementById('sellDeviceId').value;
  const body = { pc_id: pcId, customer_name: name, item, price, count };
  if (deviceId) body.device_id = parseInt(deviceId);

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/sell`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (res.ok || res.status === 201) {
      const label = item === 'high_mineral' ? '고미' : '시균';
      const devLabel = deviceId ? `#${deviceId}` : '자동';
      showToast(`${label} 주문 등록 (${devLabel} → ${name} x${count})`);
      clearDeviceSelection();
      refreshQueue();
    } else {
      const err = await res.text();
      showToast(`등록 실패: ${err}`, true);
    }
  } catch(e) {
    showToast(`오류: ${e.message}`, true);
  }
}

async function fetchQueue() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/sell?select=*&order=created_at.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return await res.json();
}

async function deleteSellRow(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/sell?id=eq.${id}`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  refreshQueue();
}

async function refreshQueue() {
  try {
    const rows = await fetchQueue();
    const el = document.getElementById('queueList');
    if (rows.length === 0) {
      el.innerHTML = '<div class="empty">대기 중인 주문 없음</div>';
      return;
    }
    el.innerHTML = rows.map(r => {
      const label = r.item === 'high_mineral' ? '고미' : '시균';
      const cls = r.item === 'high_mineral' ? 'item-hm' : 'item-ct';
      const dev = r.device_id ? `#${r.device_id}` : '자동';
      return `<div class="queue-item">
        <div class="info">
          <span class="${cls}">[${label}]</span>
          ${r.pc_id}-${dev} → ${r.customer_name} | ${r.price}만 x${r.count}
        </div>
        <button class="del-btn" onclick="deleteSellRow(${r.id})">삭제</button>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function sendCommand(evt, pcId, deviceId, command) {
  evt.stopPropagation();
  try {
    const filter = `pc_id=eq.${encodeURIComponent(pcId)}&device_id=eq.${deviceId}`;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/status?${filter}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ command })
    });
    if (res.ok) {
      const label = command === 'run' ? '시작' : '정지';
      showToast(`${pcId}-#${deviceId} ${label} 명령 전송`);
    } else {
      showToast('명령 전송 실패', true);
    }
  } catch(e) {
    showToast(`오류: ${e.message}`, true);
  }
}

// ── 골드 트렌드 ──
const GOLD_COLORS = ['#ffd700','#e91e63','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#ff5722','#8bc34a','#3f51b5',
  '#cddc39','#009688','#795548','#607d8f','#f44336','#03a9f4','#ffeb3b','#673ab7','#76ff03','#ff1744'];

async function fetchGoldHistory() {
  const since = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gold_history?recorded_date=gte.${since}&order=recorded_date.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return await res.json();
}

function parseGoldNum(g) {
  if (!g) return 0;
  return parseInt(g.replace(/,/g, '')) || 0;
}

function renderGoldChart(rows) {
  const canvas = document.getElementById('goldChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 250 * dpr;
  canvas.style.height = '250px';
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 250;
  const pad = { top: 20, right: 20, bottom: 40, left: 70 };

  // 데이터 그룹핑: { "PC7-#1 이름": { "2025-03-01": 12345, ... } }
  const devices = {};
  rows.forEach(r => {
    const key = `${r.pc_id}-#${r.device_id} ${r.name||''}`;
    if (!devices[key]) devices[key] = {};
    devices[key][r.recorded_date] = parseGoldNum(r.gold);
  });

  // 날짜 목록
  const dates = [...new Set(rows.map(r => r.recorded_date))].sort();
  if (dates.length === 0) {
    ctx.fillStyle = '#666'; ctx.font = '13px sans-serif';
    ctx.fillText('골드 기록이 없습니다', W/2-60, H/2);
    return;
  }

  const deviceKeys = Object.keys(devices).sort();

  // Y축 범위 (보유 골드)
  let minY = Infinity, maxY = 0;
  deviceKeys.forEach(dk => {
    dates.forEach(d => {
      const v = devices[dk][d];
      if (v === undefined) return;
      if (v < minY) minY = v;
      if (v > maxY) maxY = v;
    });
  });
  if (minY === Infinity) minY = 0;
  if (minY === maxY) { maxY = minY + 1000; }
  const yRange = maxY - minY;
  minY -= yRange * 0.1;
  maxY += yRange * 0.1;

  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const xStep = dates.length > 1 ? plotW / (dates.length - 1) : plotW;

  function toX(i) { return pad.left + (dates.length > 1 ? i * xStep : plotW/2); }
  function toY(v) { return pad.top + plotH - ((v - minY) / (maxY - minY)) * plotH; }

  // 배경
  ctx.clearRect(0, 0, W, H);

  // Y축 그리드
  ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = minY + (maxY - minY) * i / yTicks;
    const y = toY(v);
    ctx.strokeStyle = '#1a2a4e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
    let label;
    if (Math.abs(v) >= 100000000) label = (v/100000000).toFixed(1)+'억';
    else if (Math.abs(v) >= 10000) label = (v/10000).toFixed(0)+'만';
    else label = Math.round(v).toString();
    ctx.fillText(label, pad.left - 6, y + 4);
  }

  // X축 날짜
  ctx.fillStyle = '#666'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(dates.length / 10));
  dates.forEach((d, i) => {
    if (i % labelStep === 0 || i === dates.length - 1) {
      ctx.fillText(d.slice(5), toX(i), H - pad.bottom + 16);
    }
  });

  // 라인 그리기
  deviceKeys.forEach((dk, di) => {
    const color = GOLD_COLORS[di % GOLD_COLORS.length];
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    dates.forEach((d, i) => {
      const v = devices[dk][d];
      if (v === undefined) return;
      const x = toX(i), y = toY(v);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 마지막 포인트에 점
    const lastDate = dates[dates.length - 1];
    const lastVal = devices[dk][lastDate];
    if (lastVal !== undefined) {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(toX(dates.length-1), toY(lastVal), 3, 0, Math.PI*2); ctx.fill();
    }
  });

}

async function refreshGoldTrend() {
  try {
    const rows = await fetchGoldHistory();
    if (!Array.isArray(rows) || rows.length === 0) {
      const canvas = document.getElementById('goldChart');
      const ctx2 = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * (window.devicePixelRatio||1);
      canvas.height = 250 * (window.devicePixelRatio||1);
      canvas.style.height = '250px';
      ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
      ctx2.fillStyle = '#666'; ctx2.font = '13px sans-serif';
      ctx2.fillText('골드 기록이 없습니다', rect.width/2-60, 125);
      return;
    }
    renderGoldChart(rows);
  } catch(e) {
    const canvas = document.getElementById('goldChart');
    const ctx2 = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio||1);
    canvas.height = 250 * (window.devicePixelRatio||1);
    canvas.style.height = '250px';
    ctx2.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
    ctx2.fillStyle = '#666'; ctx2.font = '13px sans-serif';
    ctx2.fillText('골드 트렌드 로드 실패', rect.width/2-60, 125);
  }
}

async function refresh() {
  try {
    const data = await fetchStatus();
    render(data);
    refreshQueue();
    refreshGoldTrend();
  } catch (e) {
    document.getElementById('updateInfo').textContent = `오류: ${e.message}`;
    document.getElementById('updateInfo').className = 'update-info stale';
  }
}

loadPcList();
refresh();
setInterval(refresh, 30000);
</script>
